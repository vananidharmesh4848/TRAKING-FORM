<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormTrack - Supabase Cloud Backup</title>
  
  <!-- Supabase JS Client Infrastructure -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* મૂળ એપ્લિકેશનના કલર વેરિયેબલ્સ અને સ્ટાઇલ */
    :root {
      --bg: #121214;
      --card-bg: #1a1a1e;
      --t1: #ffffff;
      --t2: #a1a1aa;
      --re: #ef4444;
      --gr: #22c55e;
      --am: #eab308;
      --primary: #3b82f6;
    }
    body {
      background-color: var(--bg);
      color: var(--t1);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #2d2d34;
    }
    .ct {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .ba { background-color: var(--primary); color: #fff; }
    .bam { background-color: #4b5563; color: #fff; }
    .bg2 { background-color: #27272a; color: var(--t1); border: 1px solid #3f3f46; }
    .bsm { font-size: 14px; }
    .ok { margin-top: 10px; font-size: 14px; font-weight: 500; }
    .upbtn {
      position: relative;
      display: inline-block;
      cursor: pointer;
      background: #27272a;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      font-size: 14px;
    }
    .upbtn input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
  </style>
</head>
<body>

  <!-- SUPABASE BACKUP UI SECTION -->
  <div class="sec" id="as-bk">
    
    <!-- ક્લાઉડ બેકઅપ કાર્ડ -->
    <div class="card">
      <div class="ct">☁️ ક્લાઉડ ડેટાબેઝ સિંક (Supabase Cloud Sync)</div>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.5rem">
        <div id="sb-dot" style="width:12px; height:12px; border-radius:50%; background:var(--re); transition: 0.3s;"></div>
        <div id="sb-txt" style="font-size:14px; font-weight:500; color:var(--t2)">કનેક્શન ચેક થઈ રહ્યું છે...</div>
      </div>
      
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1rem">
        <button class="btn ba bsm" id="sb-bk-btn" onclick="sbBackup()">📤 Cloud માં બેકઅપ લો</button>
        <button class="btn bam bsm" id="sb-rs-btn" onclick="sbRestore()">📥 Cloud માંથી ડેટા રીસ્ટોર કરો</button>
      </div>
      <div id="last-bk-txt" style="font-size:12px; color:var(--t2); margin-bottom:10px;"></div>
      <div class="ok" id="sb-cloud-msg"></div>
    </div>

    <!-- લોકલ મેન્યુઅલ બેકઅપ કાર્ડ -->
    <div class="card">
      <div class="ct">💾 મેન્યુઅલ લોકલ કમ્પ્યુટર એક્સપોર્ટ</div>
      <p style="font-size:13px; color:var(--t2); margin-bottom:12px">તમારા કમ્પ્યુટરમાં સીધી JSON ફાઇલ ડાઉનલોડ કરવા માટે</p>
      
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items: center;">
        <button class="btn bg2 bsm" onclick="expJSON()">📥 ડાઉનલોડ JSON બેકઅપ</button>
        <label class="upbtn">
          <span>📤 લોકલ JSON ફાઇલ રીસ્ટોર કરો</span>
          <input type="file" accept=".json" onchange="impJSON(this)">
        </label>
      </div>
    </div>
    
  </div>

  <!-- MAIN JAVASCRIPT LOGIC -->
  <script>
    /* ============================================================ 
       SUPABASE CONFIGURATION & CREDENTIALS
       ============================================================ */
    // ⚠️ અહિયાં તમારા પોતાના Supabase Project ના URL અને Anon Key નાખો
    const SUPABASE_URL = "https://your-project-id.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.your-anon-key";

    let supabase = null;

    // મોક ડેટાબેઝ ઓબ્જેક્ટ (તમારી એપનો ઓરિજિનલ 'db' અહિયાં રિપ્લેસ થશે)
    let db = {
      managers: [],
      departments: [],
      categories: [],
      submissions: [],
      leaves: [],
      leavebal: [],
      mistakes: [],
      lateEntries: []
    };

    // ડિફોલ્ટ ડેટાબેઝ સેટઅપ (જો લોકલ સ્ટોરેજ ખાલી હોય તો)
    const DEF_DB = { ...db };

    /* ============================================================ 
       INITIALIZATION / બુટસ્ટ્રેપ સાયકલ
       ============================================================ */
    window.addEventListener('DOMContentLoaded', () => {
      // લોકલ સ્ટોરેજ ચેક
      if (!localStorage.getItem('ft6_db')) {
        localStorage.setItem('ft6_db', JSON.stringify(DEF_DB));
      } else {
        try {
          db = JSON.parse(localStorage.getItem('ft6_db'));
        } catch(e) {
          console.error("લોકલ સ્ટોરેજ ડેટા લોડ કરવામાં ભૂલ:", e);
        }
      }

      // છેલ્લે ક્યારે બેકઅપ લીધો હતો તે ડિસ્પ્લે કરવા માટે
      const lastBk = localStorage.getItem('ft7_lastbk');
      if (lastBk && document.getElementById('last-bk-txt')) {
        document.getElementById('last-bk-txt').textContent = 'છેલ્લું ક્લાઉડ બેકઅપ: ' + new Date(lastBk).toLocaleString() + ' ✅';
      }
      
      // Supabase ચાલુ કરો
      initSupabase();
    });

    // Supabase કનેક્શન કન્ફિગર કરવું
    function initSupabase() {
      if (SUPABASE_URL.includes("your-project-id")) {
        console.warn("Supabase ચેતવણી: કૃપા કરીને તમારા સાચા પ્રોજેક્ટ આઈડી અને કી સેટ કરો.");
        sbUI(false, "⚠️ Supabase સેટઅપ બાકી છે! સ્ક્રિપ્ટ એડિટ કરો.");
        return;
      }
      try {
        supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        sbUI(true, "✅ Supabase ક્લાઉડ કનેક્શન સક્રિય છે — રેડી");
      } catch (err) {
        console.error("Supabase લોડ કરવામાં ભૂલ:", err);
        sbUI(false, "❌ કનેક્શન એરર: વેરીફીકેશન ફેલ.");
      }
    }

    function sbUI(isConnected, textMessage) {
      const dot = document.getElementById('sb-dot');
      const txt = document.getElementById('sb-txt');
      if (dot) dot.style.background = isConnected ? 'var(--gr)' : 'var(--re)';
      if (txt) txt.textContent = textMessage;
    }

    // મેસેજ બતાવવા માટેનું નાનું હેલ્પર ફંક્શન
    function sm(elementId, text, isError = false) {
      const el = document.getElementById(elementId);
      if (!el) return;
      el.textContent = text;
      el.style.color = isError ? 'var(--re)' : 'var(--gr)';
    }

    // લોકલ ડેટા સેવ કરવા માટે
    function persist() {
      localStorage.setItem('ft6_db', JSON.stringify(db));
    }

    /* ============================================================ 
       CLOUD BACKUP ACTIONS (SUPABASE)
       ============================================================ */

    // 1. BACKUP NOW BUTTON: ડેટા ક્લાઉડમાં મોકલવા માટે
    async function sbBackup() {
      if (!supabase) {
        sm('sb-cloud-msg', 'Supabase કન્ફિગરેશન મળ્યું નથી!', true);
        return;
      }
      
      const msgEl = document.getElementById('sb-cloud-msg');
      msgEl.textContent = "ક્લાઉડ અપલોડ ચાલુ છે...";
      msgEl.style.color = "var(--am)";

      // આખો ડેટાબેઝ પેલોડ તૈયાર કરો
      const backupPayload = {
        managers: db.managers,
        departments: db.departments,
        categories: db.categories,
        submissions: db.submissions,
        leaves: db.leaves,
        leavebal: db.leavebal,
        mistakes: db.mistakes,
        lateEntries: db.lateEntries,
        exportedAt: new Date().toISOString()
      };

      try {
        // Supabase ના 'formtrack_backups' ટેબલમાં ડેટા ઇન્સર્ટ અથવા અપડેટ (Upsert) થશે
        const { error } = await supabase
          .from('formtrack_backups')
          .upsert([
            { 
              id: 'formtrack_active_sync', 
              payload: backupPayload, 
              updated_at: new Date().toISOString() 
            }
          ], { onConflict: 'id' });

        if (error) throw error;

        const nowStr = new Date().toISOString();
        localStorage.setItem('ft7_lastbk', nowStr);
        
        const bkTxt = document.getElementById('last-bk-txt');
        if (bkTxt) bkTxt.textContent = 'છેલ્લું ક્લાઉડ બેકઅપ: ' + new Date(nowStr).toLocaleString() + ' ✅';
        
        sm('sb-cloud-msg', '✅ ક્લાઉડ બેકઅપ સફળતાપૂર્વક સેવ થઈ ગયું છે!');
      } catch (err) {
        console.error("બેકઅપ ભૂલ:", err);
        sm('sb-cloud-msg', '❌ ક્લાઉડ સિંક નિષ્ફળ: ' + err.message, true);
      }
    }

    // 2. RESTORE BUTTON: ક્લાઉડમાંથી ડેટા પાછો લાવવા માટે
    async function sbRestore() {
      if (!supabase) {
        sm('sb-cloud-msg', 'Supabase કન્ફિગરેશન મળ્યું નથી!', true);
        return;
      }

      if (!confirm('શું તમે ખરેખર ડેટા રીસ્ટોર કરવા માંગો છો? આનાથી તમારા કમ્પ્યુટરનો હાલનો બધો ડેટા બદલાઈ જશે!')) return;

      const msgEl = document.getElementById('sb-cloud-msg');
      msgEl.textContent = "ક્લાઉડમાંથી ડેટા લાવી રહ્યા છીએ...";
      msgEl.style.color = "var(--am)";

      try {
        // ટેબલમાંથી ડેટા ખેંચવો
        const { data, error } = await supabase
          .from('formtrack_backups')
          .select('payload')
          .eq('id', 'formtrack_active_sync')
          .single();

        if (error) {
          if (error.code === 'PGRST116') {
            throw new Error("ક્લાઉડમાં કોઈ જૂનો બેકઅપ રેકોર્ડ મળ્યો નથી.");
          }
          throw error;
        }

        const remotePayload = data.payload;
        if (!remotePayload) {
          throw new Error("ડેટાબેઝ ફોર્મેટ ખાલી અથવા કરપ્ટ છે.");
        }

        // બધો જ ડેટા લોકલ મેમરીમાં સેટ કરવો
        if (remotePayload.managers) db.managers = remotePayload.managers;
        if (remotePayload.departments) db.departments = remotePayload.departments;
        if (remotePayload.categories) db.categories = remotePayload.categories;
        if (remotePayload.submissions) db.submissions = remotePayload.submissions;
        if (remotePayload.leaves) db.leaves = remotePayload.leaves;
        if (remotePayload.leavebal) db.leavebal = remotePayload.leavebal;
        if (remotePayload.mistakes) db.mistakes = remotePayload.mistakes;
        if (remotePayload.lateEntries) db.lateEntries = remotePayload.lateEntries;

        persist(); // લોકલ સ્ટોરેજ અપડેટ કરો
        
        // જો તમારી એપમાં સ્ક્રીન રિફ્રેશ કરવાનું ફંક્શન (જેમ કે renderOv) હોય તો તેને કોલ કરો
        if (typeof renderOv === 'function') renderOv();
        
        alert('🎉 ક્લાઉડ રીસ્ટોર સફળ રહ્યું! ડેટા અપડેટ થઈ ગયો છે.');
        sm('sb-cloud-msg', '✅ રીસ્ટોર પ્રક્રિયા સફળતાપૂર્વક પૂર્ણ થઈ!');
      } catch (err) {
        console.error("રીસ્ટોર ભૂલ:", err);
        sm('sb-cloud-msg', '❌ રીસ્ટોર નિષ્ફળ: ' + err.message, true);
      }
    }

    /* ============================================================ 
       MANUAL LOCAL FILE BACKUP (JSON EXPORT/IMPORT)
       ============================================================ */
    function expJSON() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
      const dlAnchorElem = document.createElement('a');
      dlAnchorElem.setAttribute("href", dataStr);
      dlAnchorElem.setAttribute("download", `formtrack_local_backup_${new Date().toISOString().slice(0,10)}.json`);
      dlAnchorElem.click();
    }

    function impJSON(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedDb = JSON.parse(e.target.result);
          if (importedDb && typeof importedDb === 'object') {
            db = importedDb;
            persist();
            if (typeof renderOv === 'function') renderOv();
            alert('✅ લોકલ JSON બેકઅપ સફળતાપૂર્વક લોડ થઈ ગયું છે!');
          }
        } catch (err) {
          alert('❌ ફાઇલ વાંચવામાં ભૂલ આવી, કૃપા કરીને સાચી JSON ફાઇલ અપલોડ કરો.');
        }
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>

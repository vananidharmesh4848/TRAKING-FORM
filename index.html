<script>
/* ======================
   Your existing JavaScript code
====================== */

// Google Sign-In related code
const GD_CLIENT_ID='87896498461-qmcsm4helca8p5on0du5kjfspa556vgv.apps.googleusercontent.com'; // Your Client ID
const GD_SCOPES='https://www.googleapis.com/auth/drive.file';

let gdToken=null;
let tclient=null;

// Initialize Google Sign-In UI
function gdUI() {
  const ok=!!gdToken;
  ['gd-bk','gd-rs','gd-out'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display=ok?'inline-flex':'none';
  });
  document.getElementById('gd-st-txt').textContent=ok?'✅ Connected — Ready to backup':'Not signed in';
  document.getElementById('gd-dot').style.background=ok?'var(--gr)':'var(--re)';
}

// Sign in with Google
function gdSignIn() {
  if(GD_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID_HERE'){
    alert('⚠️ Setup Google Cloud Console first — see steps below');
    return;
  }
  if(typeof google==='undefined'){
    alert('Loading Google API...');
    // Load script if not loaded
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=initGSignIn;
    document.head.appendChild(s);
  } else {
    initGSignIn();
  }
}

function initGSignIn() {
  tclient=google.accounts.oauth2.initTokenClient({
    client_id:GD_CLIENT_ID,
    scope:GD_SCOPES,
    callback:(response)=>{
      if(response.error){
        alert('Sign-in failed: '+response.error);
        return;
      }
      gdToken=response.access_token;
      gdUI();
      alert('✅ Signed in!');
    }
  });
  tclient.requestAccessToken({prompt:'consent'});
}

// Sign out
function gdSignOut() {
  if(gdToken){
    google.accounts.oauth2.revoke(gdToken, ()=>{});
    gdToken=null;
  }
  gdUI();
  alert('Signed out');
}

// Backup to Google Drive
async function gdBackup() {
  if(!gdToken){ alert('Sign in first'); return; }
  document.getElementById('gd-st-txt').textContent='Uploading...';

  try {
    // Check for folder
    const q=encodeURIComponent(`name='FormTrack_Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers:{'Authorization':'Bearer '+gdToken} });
    const data=await res.json();
    let folderId=data.files?.[0]?.id;
    if(!folderId){
      const cr=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Authorization':'Bearer '+gdToken,'Content-Type':'application/json'},body:JSON.stringify({name:'FormTrack_Backups',mimeType:'application/vnd.google-apps.folder'})});
      const cd=await cr.json();
      folderId=cd.id;
    }

    // Prepare payload
    const payload=JSON.stringify({
      managers:db.managers,
      departments:db.departments,
      categories:db.categories,
      submissions:db.submissions,
      leaves:db.leaves,
      leavebal:db.leavebal,
      backupAt:new Date().toISOString()
    });
    const fname='FormTrack_'+tod()+'.json';

    // Upload file
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:fname,mimeType:'application/json',parents:[folderId]})],{type:'application/json'}));
    form.append('file',new Blob([payload],{type:'application/json'}));

    const uploadRes=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+gdToken},body:form});
    const resData=await uploadRes.json();
    if(resData.id){
      alert('✅ Backup saved: '+fname);
    } else {
      alert('Backup failed');
    }
  } catch(e) {
    alert('Error: '+e.message);
  }
  gdUI();
}

// Restore from Google Drive
async function gdRestore() {
  if(!gdToken){ alert('Sign in first'); return; }
  try {
    const q=encodeURIComponent(`name contains 'FormTrack_' and trashed=false`);
    const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=createdTime+desc&fields=files(id,name)`,{headers:{'Authorization':'Bearer '+gdToken}});
    const data=await res.json();
    if(!data.files?.length){ alert('No backup found'); return; }
    if(!confirm('Restore from: '+data.files[0].name+'?')) return;

    const fileId=data.files[0].id;
    const fileRes=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{'Authorization':'Bearer '+gdToken}});
    const bk=await fileRes.json();

    // Load backup data
    if(bk.managers) db.managers=bk.managers;
    if(bk.departments) db.departments=bk.departments;
    if(bk.categories) db.categories=bk.categories;
    if(bk.submissions) db.submissions=bk.submissions;
    if(bk.leaves) db.leaves=bk.leaves;
    if(bk.leavebal) db.leavebal=bk.leavebal;

    persist();
    alert('✅ Restored! Refreshing...');
    location.reload();
  } catch(e){
    alert('Error: '+e.message);
  }
}

// Export JSON
function expJSON() {
  const dataStr='data:application/json,'+encodeURIComponent(JSON.stringify({
    managers:db.managers,
    departments:db.departments,
    categories:db.categories,
    submissions:db.submissions,
    leaves:db.leaves,
    leavebal:db.leavebal,
    exportedAt:new Date().toISOString()
  }));
  const a=document.createElement('a');
  a.href=dataStr;
  a.download='FormTrack_'+tod()+'.json';
  a.click();
  alert('✅ Downloaded!');
}

// Import JSON
function impJSON(input) {
  const f=input.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try {
      const d=JSON.parse(e.target.result);
      if(!d.managers){ alert('Invalid file'); return; }
      if(!confirm('Restore? This replaces all data!')) return;
      if(d.managers) db.managers=d.managers;
      if(d.departments) db.departments=d.departments;
      if(d.categories) db.categories=d.categories;
      if(d.submissions) db.submissions=d.submissions;
      if(d.leaves) db.leaves=d.leaves;
      if(d.leavebal) db.leavebal=d.leavebal;
      persist();
      alert('✅ Restored! Refreshing...');
      location.reload();
    } catch(e) {
      alert('Invalid JSON');
    }
  };
  r.readAsText(f);
}

// Load session
window.addEventListener('DOMContentLoaded', ()=>{
  if(!restoreSession()) showPg('pg-login');
});
</script>

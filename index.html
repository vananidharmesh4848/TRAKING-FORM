<script>
// --- CORE CONFIGURATION & CONSTANTS ---
const CONFIG = {
  LS_PREFIX: 'ft_v1_',
  ADMIN_DEFAULT_PW: 'admin123',
  LEAVE_TYPES: ['Casual Leave', 'Sick Leave', 'Earned Leave', 'Maternity Leave', 'Paternity Leave', 'Unpaid Leave'],
  DEFAULT_BALANCE: 12
};

// --- APPLICATION INITIAL ENGINE STATE ---
let state = {
  user: null, // { role: 'm'|'a', id, name, dept }
  shift: 'day',
  managers: [],
  departments: [],
  categories: [],
  submissions: [],
  leaves: [],
  mistakes: [],
  balances: {} // structural layout: { managerId: { leaveType: daysLeft } }
};

// --- INITIALIZE DATA SCHEMAS ---
function initStorage() {
  const get = (key, df) => {
    const data = localStorage.getItem(CONFIG.LS_PREFIX + key);
    return data ? JSON.parse(data) : df;
  };

  state.departments = get('depts', ['Production', 'Quality Control', 'Logistics', 'Maintenance']);
  state.categories = get('cats', [
    { id: 'c1', name: 'Daily Checklist', dept: 'Production' },
    { id: 'c2', name: 'Material Inward Cross Tally', dept: 'Logistics' },
    { id: 'c3', name: 'Machine Maintenance Log', dept: 'Maintenance' },
    { id: 'c4', name: 'Final Inspection Report', dept: 'Quality Control' }
  ]);
  state.managers = get('mgrs', [
    { id: 'MGR-01', name: 'Rajesh Patel', dept: 'Production', pw: '123456' },
    { id: 'MGR-02', name: 'Amit Sharma', dept: 'Quality Control', pw: '123456' }
  ]);
  state.submissions = get('subs', []);
  state.leaves = get('leaves', []);
  state.mistakes = get('mistakes', []);
  state.balances = get('balances', {});

  // Establish standard default fallback balances for managers
  state.managers.forEach(m => {
    if (!state.balances[m.id]) {
      state.balances[m.id] = {};
      CONFIG.LEAVE_TYPES.forEach(t => state.balances[m.id][t] = CONFIG.DEFAULT_BALANCE);
    }
  });
  saveToStorage();
}

function saveToStorage() {
  const set = (key, val) => localStorage.setItem(CONFIG.LS_PREFIX + key, JSON.stringify(val));
  set('depts', state.departments);
  set('cats', state.categories);
  set('mgrs', state.managers);
  set('subs', state.submissions);
  set('leaves', state.leaves);
  set('mistakes', state.mistakes);
  set('balances', state.balances);
}

// --- CORE AUTHENTICATION UI ENGINE ---
let selectedRole = null;
function selR(role) {
  selectedRole = role;
  document.getElementById('rc-m').classList.toggle('on', role === 'm');
  document.getElementById('rc-a').classList.toggle('on', role === 'a');
  document.getElementById('mb').style.display = role === 'm' ? 'block' : 'none';
  document.getElementById('ab').style.display = role === 'a' ? 'block' : 'none';
  document.getElementById('lerr').textContent = '';
}

function tpw(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function doLogin() {
  const err = document.getElementById('lerr');
  err.textContent = '';

  if (!selectedRole) {
    err.textContent = 'Please select a profile role to log in.';
    return;
  }

  if (selectedRole === 'm') {
    const id = document.getElementById('l-id').value.trim().toUpperCase();
    const pw = document.getElementById('l-pw').value;
    const mgr = state.managers.find(m => m.id === id);
    if (!mgr || mgr.pw !== pw) {
      err.textContent = 'Invalid Manager Credentials ID or Password.';
      return;
    }
    state.user = { role: 'm', id: mgr.id, name: mgr.name, dept: mgr.dept };
    setupManagerView();
  } else {
    const apw = document.getElementById('l-apw').value;
    if (apw !== CONFIG.ADMIN_DEFAULT_PW) {
      err.textContent = 'Invalid Administrator Master Security Key.';
      return;
    }
    state.user = { role: 'a', name: 'Administrator' };
    setupAdminView();
  }

  document.getElementById('pg-login').classList.remove('on');
}

function doLogout() {
  state.user = null;
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-login').classList.add('on');
  document.getElementById('l-id').value = '';
  document.getElementById('l-pw').value = '';
  document.getElementById('l-apw').value = '';
}

// --- MANAGER SUB-MODULE ACTIONS ---
function setupManagerView() {
  document.getElementById('pg-mgr').classList.add('on');
  document.getElementById('m-nm').textContent = state.user.name;
  document.getElementById('m-dp').textContent = `ID: ${state.user.id} · ${state.user.dept}`;
  
  // Set current date string
  document.getElementById('sub-d').value = new Date().toISOString().split('T')[0];
  updateTimeTicker();
  mTab('sub', document.getElementById('mn-sub'));
  buildCategoryForm();
  buildManagerLeaveSelectors();
  updateManagerBadges();
}

function updateTimeTicker() {
  const update = () => {
    const tEl = document.getElementById('sub-t');
    if(tEl) tEl.value = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };
  update();
  clearInterval(window.tickerInterval);
  window.tickerInterval = setInterval(update, 1000);
}

function psh(shift) {
  state.shift = shift;
  document.getElementById('sh-d').classList.toggle('on', shift === 'day');
  document.getElementById('sh-n').classList.toggle('on', shift === 'night');
}

function buildCategoryForm() {
  const parent = document.getElementById('cat-area');
  parent.innerHTML = '';
  const myCats = state.categories.filter(c => c.dept === state.user.dept);

  if (myCats.length === 0) {
    parent.innerHTML = '<div class="empty"><div class="ee">📦</div>No categories linked to your department.</div>';
    return;
  }

  myCats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'ci';
    div.id = `ci-${c.id}`;
    div.innerHTML = `
      <div class="chdr">
        <div class="cnm">📄 ${c.name}</div>
        <span class="ccnt" id="cnt-${c.id}">0 Files</span>
      </div>
      <label class="upbtn">
        <span>📤 Tap here to capture / browse files</span>
        <input type="file" multiple accept="image/*,application/pdf" onchange="handleFormUpload('${c.id}', this)">
      </label>
      <div class="chips" id="chips-${c.id}"></div>
    `);
    parent.appendChild(div);
  });
}

// Memory block to store temporarily encoded local files
let activeUploads = {}; 

function handleFormUpload(catId, input) {
  if (!activeUploads[catId]) activeUploads[catId] = [];
  const files = Array.from(input.files);

  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = function(e) {
      activeUploads[catId].push({ name: f.name, data: e.target.result, type: f.type });
      renderFormChips(catId);
    };
    reader.readAsDataURL(f);
  });
}

function renderFormChips(catId) {
  const container = document.getElementById(`chips-${catId}`);
  const counter = document.getElementById(`cnt-${catId}`);
  const card = document.getElementById(`ci-${catId}`);
  const arr = activeUploads[catId] || [];

  container.innerHTML = '';
  if (arr.length > 0) {
    counter.style.display = 'inline-block';
    counter.textContent = `${arr.length} ${arr.length === 1 ? 'File' : 'Files'}`;
    card.classList.add('hf');
  } else {
    counter.style.display = 'none';
    card.classList.remove('hf');
  }

  arr.forEach((file, index) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    const isImg = file.type.startsWith('image/');
    chip.innerHTML = `
      ${isImg ? `<img src="${file.data}" onclick="openLightbox('${file.data}')">` : '<span style="font-size:16px;padding-left:4px">📄</span>'}
      <span style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span>
      <span class="cx" onclick="removeUploadedFile('${catId}', ${index})">✕</span>
    `;
    container.appendChild(chip);
  });
}

function removeUploadedFile(catId, idx) {
  if (activeUploads[catId]) {
    activeUploads[catId].splice(idx, 1);
    renderFormChips(catId);
  }
}

function clrSub() {
  activeUploads = {};
  buildCategoryForm();
  document.getElementById('sub-n').value = '';
  document.getElementById('sub-msg').textContent = '';
}

function subForms() {
  const msg = document.getElementById('sub-msg');
  msg.textContent = '';
  const date = document.getElementById('sub-d').value;
  const notes = document.getElementById('sub-n').value.trim();

  if (!date) {
    alert('Please choose a valid filing track date.');
    return;
  }

  const items = [];
  let totalFiles = 0;
  state.categories.filter(c => c.dept === state.user.dept).forEach(c => {
    const files = activeUploads[c.id] || [];
    if (files.length > 0) {
      items.push({ catId: c.id, catName: c.name, files: [...files] });
      totalFiles += files.length;
    }
  });

  if (items.length === 0) {
    alert('Please select and upload at least one system form before submitting.');
    return;
  }

  const report = {
    id: 'REP-' + Date.now().toString().slice(-6),
    mgrId: state.user.id,
    mgrName: state.user.name,
    dept: state.user.dept,
    shift: state.shift,
    date: date,
    time: document.getElementById('sub-t').value,
    timestamp: new Date().toISOString(),
    items: items,
    notes: notes
  };

  state.submissions.unshift(report);
  saveToStorage();
  clrSub();

  msg.textContent = `✅ Successfully submitted Report (${report.id}) containing ${totalFiles} documents.`;
  setTimeout(() => msg.textContent = '', 5000);
}

function mTab(secId, btn) {
  document.querySelectorAll('#pg-mgr .sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('#pg-mgr .nb').forEach(b => b.classList.remove('on'));
  document.getElementById(`ms-${secId}`).classList.add('on');
  btn.classList.add('on');

  if (secId === 'rep') renderManagerReports();
  if (secId === 'lv') renderManagerLeaveView();
  if (secId === 'mist') renderManagerMistakes();
}

function renderManagerReports() {
  const container = document.getElementById('my-reps');
  container.innerHTML = '';
  const myData = state.submissions.filter(s => s.mgrId === state.user.id);

  if (myData.length === 0) {
    container.innerHTML = '<div class="empty"><div class="ee">📅</div>No track records compiled yet.</div>';
    return;
  }

  myData.forEach(r => {
    const div = document.createElement('div');
    div.className = 'rep';
    let fileHtml = '';
    r.items.forEach(itm => {
      fileHtml += `<div class="cfg"><div class="cft">${itm.catName} (${itm.files.length})</div><div class="tr2">`;
      itm.files.forEach(f => {
        if (f.type.startsWith('image/')) {
          fileHtml += `<img src="${f.data}" class="th" onclick="openLightbox('${f.data}')">`;
        } else {
          fileHtml += `<div class="tp" onclick="openPdfPlaceholder()"><span>📄</span><span style="font-size:8px;text-align:center;word-break:break-all">${f.name.slice(0,10)}</span></div>`;
        }
      });
      fileHtml += `</div></div>`;
    });

    div.innerHTML = `
      <div class="rt">
        <div>
          <div class="rnm">${r.date} <span class="badge ${r.shift==='day'?'b-day':'b-night'}">${r.shift==='day'?'☀️ Day':'🌙 Night'}</span></div>
          <div class="rid">Submission Ref: ${r.id} @ ${r.time}</div>
        </div>
      </div>
      <div class="rm"><span>🏬 Dept: ${r.dept}</span></div>
      ${fileHtml}
      ${r.notes ? `<div class="notebox"><b>Remarks:</b> ${r.notes}</div>` : ''}
    `;
    container.appendChild(div);
  });
}

function openPdfPlaceholder() {
  alert('PDF Document viewing profile initialized.');
}

function buildManagerLeaveSelectors() {
  const sel = document.getElementById('lv-type');
  sel.innerHTML = CONFIG.LEAVE_TYPES.map(t => `<option value="${t}">${t}</option>`).join('');
}

function renderManagerLeaveView() {
  const balGrid = document.getElementById('mgr-bal');
  balGrid.innerHTML = '';
  const bals = state.balances[state.user.id] || {};

  CONFIG.LEAVE_TYPES.forEach(t => {
    const days = bals[t] !== undefined ? bals[t] : CONFIG.DEFAULT_BALANCE;
    balGrid.innerHTML += `
      <div class="bal-c">
        <div class="bal-n">${days}</div>
        <div class="bal-l">${t}</div>
      </div>
    `;
  });

  const histContainer = document.getElementById('my-lv-list');
  histContainer.innerHTML = '';
  const myLv = state.leaves.filter(l => l.mgrId === state.user.id);

  if (myLv.length === 0) {
    histContainer.innerHTML = '<div class="empty">No leave requests logged yet.</div>';
    return;
  }

  myLv.forEach(l => {
    let stCls = 'b-am';
    let stTxt = '⏳ Pending';
    if(l.status === 'approved') { stCls = 'b-gr'; stTxt = '✅ Approved'; }
    if(l.status === 'rejected') { stCls = 'b-re'; stTxt = '❌ Rejected'; }

    histContainer.innerHTML += `
      <div class="lv-row">
        <div class="lv-top">
          <div class="lv-name">${l.type} <span class="badge ${stCls}">${stTxt}</span></div>
          <div class="rid">${l.days} ${l.days===1?'Day':'Days'}</div>
        </div>
        <div class="lv-meta">
          <span>📅 Duration: <b>${l.from}</b> to <b>${l.to}</b></span>
          <span>Applied: ${new Date(l.appliedAt).toLocaleDateString()}</span>
        </div>
        <div style="font-size:12px;color:var(--t2);margin-top:4px"><b>Reason:</b> ${l.reason}</div>
      </div>
    `;
  });
}

function applyLv() {
  const msg = document.getElementById('lv-msg');
  msg.textContent = '';
  const type = document.getElementById('lv-type').value;
  const from = document.getElementById('lv-from').value;
  const to = document.getElementById('lv-to').value;
  const reason = document.getElementById('lv-rsn').value.trim();

  if (!from || !to || !reason) {
    alert('Please fill out all missing details.');
    return;
  }

  const d1 = new Date(from);
  const d2 = new Date(to);
  if (d2 < d1) {
    alert('The end date cannot precede the start date.');
    return;
  }

  const days = Math.floor((d2 - d1) / (1000*60*60*24)) + 1;
  const currentBal = (state.balances[state.user.id] || {})[type] || 0;

  if (currentBal < days && type !== 'Unpaid Leave') {
    alert(`Insufficient balance. You have requested ${days} days, but your current balance is ${currentBal} days.`);
    return;
  }

  const req = {
    id: 'LV-' + Date.now().toString().slice(-5),
    mgrId: state.user.id,
    mgrName: state.user.name,
    dept: state.user.dept,
    type: type,
    from: from,
    to: to,
    days: days,
    reason: reason,
    status: 'pending',
    appliedAt: new Date().toISOString()
  };

  state.leaves.unshift(req);
  saveToStorage();
  document.getElementById('lv-from').value = '';
  document.getElementById('lv-to').value = '';
  document.getElementById('lv-rsn').value = '';

  msg.textContent = '📨 Leave request successfully submitted for review.';
  renderManagerLeaveView();
}

function renderManagerMistakes() {
  const container = document.getElementById('mgr-mist-list');
  container.innerHTML = '';
  const myM = state.mistakes.filter(m => m.mgrId === state.user.id);

  if (myM.length === 0) {
    container.innerHTML = '<div class="empty"><div class="ee">☀️</div>No performance entries or mistakes on record. Keep it up!</div>';
    return;
  }

  myM.forEach(m => {
    container.innerHTML += `
      <div class="mist-row">
        <div class="mist-top">
          <div class="mist-name">${m.category} <span class="badge sv-${m.severity}">${m.severity.toUpperCase()}</span></div>
          <div class="rid">${m.date}</div>
        </div>
        <div style="font-size:13px;color:var(--t);margin-top:6px"><b>Issue:</b> ${m.description}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:4px;padding-top:4px;border-top:1px dashed var(--bd)"><b>Action Corrective:</b> ${m.action}</div>
      </div>
    `;
  });
}

function updateManagerBadges() {
  const cnt = state.mistakes.filter(m => m.mgrId === state.user.id).length;
  const b = document.getElementById('mist-mgr-badge');
  if (cnt > 0) { b.style.display = 'block'; b.textContent = cnt; }
  else { b.style.display = 'none'; }
}

// --- ADMIN SYSTEM ARCHITECTURE ---
function setupAdminView() {
  document.getElementById('pg-admin').classList.add('on');
  aTab('ov', document.querySelector('.atab'));
  buildAdminFilterDropdowns();
}

function aTab(secId, btn) {
  document.querySelectorAll('#pg-admin .sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('#pg-admin .atab').forEach(b => b.classList.remove('on'));
  document.getElementById(`as-${secId}`).classList.add('on');
  btn.classList.add('on');

  if(secId === 'ov') renderAdminOverview();
  if(secId === 'rp') renderReps();
  if(secId === 'lv') { renderLvPendingList(); renderLvReport(); renderLvBalSummary(); }
  if(secId === 'mist') { renderMistStats(); renderMistReport(); }
  if(secId === 'mg') renderAdminManagers();
  if(secId === 'dp') renderAdminDepts();
  if(secId === 'ct') renderAdminCats();
  updateAdminBadges();
}

function updateAdminBadges() {
  const pLv = state.leaves.filter(l => l.status === 'pending').length;
  const bLv = document.getElementById('lv-badge');
  if(pLv > 0) { bLv.style.display = 'inline-block'; bLv.textContent = pLv; }
  else bLv.style.display = 'none';

  const pM = state.mistakes.length;
  const bM = document.getElementById('mist-badge');
  if(pM > 0) { bM.style.display = 'inline-block'; bM.textContent = pM; }
  else bM.style.display = 'none';
}

function buildAdminFilterDropdowns() {
  const populate = (id, arr, valKey, txtKey) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = (id.startsWith('f') || id.startsWith('m')) ? `<option value="">All</option>` : `<option value="">— Select —</option>`;
    arr.forEach(i => {
      const v = valKey ? i[valKey] : i;
      const t = txtKey ? i[txtKey] : i;
      el.innerHTML += `<option value="${v}">${t}</option>`;
    });
  };

  populate('fm', state.managers, 'id', 'name');
  populate('fd', state.departments);
  populate('lf-mg', state.managers, 'id', 'name');
  populate('lf-tp', CONFIG.LEAVE_TYPES);
  populate('sb-mg', state.managers, 'id', 'name');
  populate('sb-tp', CONFIG.LEAVE_TYPES);
  populate('mr-mg', state.managers, 'id', 'name');
  populate('mf-mg', state.managers, 'id', 'name');
  populate('mf-cat', ['Form Error', 'Late Submission', 'Missing Data', 'Process Violation', 'Safety Issue', 'Quality Issue', 'Attendance', 'Other']);
  populate('nd', state.departments);
  populate('cd', state.departments);
}

function renderAdminOverview() {
  const stats = document.getElementById('a-stats');
  const todayStr = new Date().toISOString().split('T')[0];
  const tCount = state.submissions.filter(s => s.date === todayStr).length;

  stats.innerHTML = `
    <div class="sc"><div class="sn">${state.submissions.length}</div><div class="sl">Total Submissions</div></div>
    <div class="sc"><div class="sn">${tCount}</div><div class="sl">Filed Today</div></div>
    <div class="sc"><div class="sn" style="color:var(--pu)">${state.leaves.filter(l=>l.status==='pending').length}</div><div class="sl">Pending Leaves</div></div>
    <div class="sc"><div class="sn" style="color:var(--re)">${state.mistakes.length}</div><div class="sl">Total Mistakes</div></div>
  `;

  const sumBox = document.getElementById('a-sum');
  sumBox.innerHTML = '';
  
  if (state.managers.length === 0) {
    sumBox.innerHTML = '<div class="empty">No active structural managers found.</div>';
    return;
  }

  state.managers.forEach(m => {
    const mSubs = state.submissions.filter(s => s.mgrId === m.id);
    const last = mSubs.length > 0 ? mSubs[0].date : 'Never';
    sumBox.innerHTML += `
      <div class="mr">
        <div class="av">${m.name.split(' ').map(n=>n[0]).join('')}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${m.name} <span style="font-size:11px;color:var(--t2)">(${m.id})</span></div>
          <div style="font-size:11px;color:var(--t2)">Dept: ${m.dept} · Filed: ${mSubs.length} times</div>
        </div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--t2)">Last Submitted</div><div style="font-size:12px;font-weight:500">${last}</div></div>
      </div>
    `;
  });
}

function renderReps() {
  const container = document.getElementById('all-reps');
  container.innerHTML = '';

  const fF = document.getElementById('ff').value;
  const fT = document.getElementById('ft').value;
  const fSh = document.getElementById('fsh').value;
  const fM = document.getElementById('fm').value;
  const fD = document.getElementById('fd').value;

  let filtered = [...state.submissions];

  if (fF) filtered = filtered.filter(r => r.date >= fF);
  if (fT) filtered = filtered.filter(r => r.date <= fT);
  if (fSh) filtered = filtered.filter(r => r.shift === fSh);
  if (fM) filtered = filtered.filter(r => r.mgrId === fM);
  if (fD) filtered = filtered.filter(r => r.dept === fD);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No system form submissions match query logs.</div>';
    return;
  }

  filtered.forEach(r => {
    const div = document.createElement('div');
    div.className = 'rep';
    let fileHtml = '';
    r.items.forEach(itm => {
      fileHtml += `<div class="cfg"><div class="cft">${itm.catName} (${itm.files.length})</div><div class="tr2">`;
      itm.files.forEach(f => {
        if (f.type.startsWith('image/')) {
          fileHtml += `<img src="${f.data}" class="th" onclick="openLightbox('${f.data}')">`;
        } else {
          fileHtml += `<div class="tp" onclick="openPdfPlaceholder()"><span>📄</span><span style="font-size:8px;text-align:center;word-break:break-all">${f.name.slice(0,10)}</span></div>`;
        }
      });
      fileHtml += `</div></div>`;
    });

    div.innerHTML = `
      <div class="rt">
        <div>
          <div class="rnm">${r.mgrName} <span class="badge ${r.shift==='day'?'b-day':'b-night'}">${r.shift==='day'?'☀️ Day':'🌙 Night'}</span></div>
          <div class="rid">Ref: ${r.id} | Date Track: ${r.date} @ ${r.time}</div>
        </div>
      </div>
      <div class="rm"><span>🏢 Dept: ${r.dept}</span></div>
      ${fileHtml}
      ${r.notes ? `<div class="notebox"><b>Notes:</b> ${r.notes}</div>` : ''}
    `;
    container.appendChild(div);
  });
}

function clrF() {
  document.getElementById('ff').value = '';
  document.getElementById('ft').value = '';
  document.getElementById('fsh').value = '';
  document.getElementById('fm').value = '';

// --- ADMIN LEAVE CONTROLLER ENGINE ---
function renderLvPendingList() {
  const container = document.getElementById('lv-pending-list');
  container.innerHTML = '';
  const p = state.leaves.filter(l => l.status === 'pending');

  if(p.length === 0) {
    container.innerHTML = '<div class="empty">No outstanding pending leave requests.</div>';
    return;
  }

  p.forEach(l => {
    container.innerHTML += `
      <div class="lv-row">
        <div class="lv-top">
          <div class="lv-name">${l.mgrName} <span style="font-weight:normal;color:var(--t2)">(${l.dept})</span></div>
          <div class="rid">${l.days} Days (${l.type})</div>
        </div>
        <div class="lv-meta">📅 Range: <b>${l.from}</b> to <b>${l.to}</b></div>
        <div style="font-size:12px;margin:6px 0"><b>Reason:</b> ${l.reason}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn bre bxs" onclick="setLeaveStatus('${l.id}','rejected')">❌ Reject</button>
          <button class="btn bgr bxs" onclick="setLeaveStatus('${l.id}','approved')">✅ Approve</button>
        </div>
      </div>
    `;
  });
}

function setLeaveStatus(id, status) {
  const l = state.leaves.find(x => x.id === id);
  if (!l) return;

  if (status === 'approved' && l.type !== 'Unpaid Leave') {
    const bals = state.balances[l.mgrId] || {};
    const cur = bals[l.type] !== undefined ? bals[l.type] : CONFIG.DEFAULT_BALANCE;
    if (cur < l.days) {
      alert(`Cannot approve. Manager only has ${cur} days available for ${l.type}.`);
      return;
    }
    state.balances[l.mgrId][l.type] = cur - l.days;
  }

  l.status = status;
  saveToStorage();
  aTab('lv', document.querySelector('.atab.on'));
}

function renderLvReport() {
  const tbody = document.getElementById('lv-rep-body');
  tbody.innerHTML = '';

  const st = document.getElementById('lf-st').value;
  const mg = document.getElementById('lf-mg').value;
  const tp = document.getElementById('lf-tp').value;
  const fr = document.getElementById('lf-from').value;
  const to = document.getElementById('lf-to').value;

  let res = [...state.leaves];
  if(st) res = res.filter(l=>l.status===st);
  if(mg) res = res.filter(l=>l.mgrId===mg);
  if(tp) res = res.filter(l=>l.type===tp);
  if(fr) res = res.filter(l=>l.from>=fr);
  if(to) res = res.filter(l=>l.to<=to);

  if(res.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">No leave profiles found matching filters.</td></tr>';
    return;
  }

  res.forEach(l => {
    let sB = `<span class="badge b-am">Pending</span>`;
    if(l.status === 'approved') sB = `<span class="badge b-gr">Approved</span>`;
    if(l.status === 'rejected') sB = `<span class="badge b-re">Rejected</span>`;

    const actBtn = l.status==='pending' ? 
      `<button class="btn bg2 bxs" onclick="setLeaveStatus('${l.id}','approved')">Approve</button>` : '—';

    tbody.innerHTML += `
      <tr>
        <td><b>${l.mgrName}</b></td>
        <td>${l.dept}</td>
        <td>${l.type}</td>
        <td>${l.from}</td>
        <td>${l.to}</td>
        <td>${l.days}</td>
        <td>${sB}</td>
        <td>${new Date(l.appliedAt).toLocaleDateString()}</td>
        <td>${actBtn}</td>
      </tr>
    `;
  });
}

function clrLvF() {
  document.getElementById('lf-st').value = '';
  document.getElementById('lf-mg').value = '';
  document.getElementById('lf-tp').value = '';
  document.getElementById('lf-from').value = '';
  document.getElementById('lf-to').value = '';

}

function renderLvBalSummary() {
  const hdr = document.getElementById('lv-bal-hdr');
  const body = document.getElementById('lv-bal-body');

  hdr.innerHTML = '<th>Manager</th><th>Department</th>' + CONFIG.LEAVE_TYPES.map(t=>`<th>${t}</th>`).join('');

function setBalance() {
  const mId = document.getElementById('sb-mg').value;
  const type = document.getElementById('sb-tp').value;
  const val = document.getElementById('sb-val').value;
  const msg = document.getElementById('sb-msg');

  if(!mId || !type || val==='') { alert('Please select a manager, type, and specify a balance.'); return; }

  if(!state.balances[mId]) state.balances[mId] = {};
  state.balances[mId][type] = parseInt(val, 10);

  msg.textContent = '🔧 Balance explicitly overwritten.';
  setTimeout(() => msg.textContent = '', 3000);
  renderLvBalSummary();

// --- ADMIN MISTAKE PROFILE ENGINE ---
function addMistake() {
  const mgrId = document.getElementById('mr-mg').value;
  const dt = document.getElementById('mr-dt').value;
  const sv = document.getElementById('mr-sv').value;
  const cat = document.getElementById('mr-cat').value;
  const desc = document.getElementById('mr-desc').value.trim();
  const act = document.getElementById('mr-action').value.trim();
  const msg = document.getElementById('mr-msg');

  if(!mgrId || !dt || !desc || !act) { alert('Please complete all form parameters.'); return; }
  const mgr = state.managers.find(m => m.id === mgrId);

  const report = {
    id: 'MST-' + Date.now().toString().slice(-5),
    mgrId: mgrId,
    mgrName: mgr.name,
    dept: mgr.dept,
    date: dt,
    severity: sv,
    category: cat,
    description: desc,
    action: act,
    timestamp: new Date().toISOString()
  };

  state.mistakes.unshift(report);
  saveToStorage();

  document.getElementById('mr-desc').value = '';
  document.getElementById('mr-action').value = '';
  msg.textContent = '⚠️ Internal infraction profile entry mapped.';
  setTimeout(()=> msg.textContent='', 4000);

  aTab('mist', document.querySelector('.atab.on'));
}

function renderMistStats() {
  const container = document.getElementById('mist-stats');
  const count = (s) => state.mistakes.filter(m => m.severity === s).length;

  container.innerHTML = `
    <div class="sc"><div class="sn" style="color:#FBBF24">${count('minor')}</div><div class="sl">Minor (🟡)</div></div>
    <div class="sc"><div class="sn" style="color:#FB923C">${count('moderate')}</div><div class="sl">Moderate (🟠)</div></div>
    <div class="sc"><div class="sn" style="color:#F87171">${count('major')}</div><div class="sl">Major (🔴)</div></div>
    <div class="sc"><div class="sn" style="color:#EF4444">${count('critical')}</div><div class="sl">Critical (🚨)</div></div>
  `;
}

function renderMistReport() {
  const body = document.getElementById('perf-body');
  body.innerHTML = '';

  // Performance Matrix Evaluation Logic
  state.managers.forEach(m => {
    const list = state.mistakes.filter(x => x.mgrId === m.id);
    const nMin = list.filter(x => x.severity==='minor').length;
    const nMod = list.filter(x => x.severity==='moderate').length;
    const nMaj = list.filter(x => x.severity==='major').length;
    const nCri = list.filter(x => x.severity==='critical').length;

    // Standard Deductive Merit Scoring Base Engine
    let baseScore = 100;
    baseScore -= (nMin * 2) + (nMod * 5) + (nMaj * 15) + (nCri * 30);
    if(baseScore < 0) baseScore = 0;

    let pCls = 'perf-good';
    if(baseScore < 85) pCls = 'perf-ok';
    if(baseScore < 65) pCls = 'perf-bad';

    body.innerHTML += `
      <tr>
        <td><b>${m.name}</b></td>
        <td>${m.dept}</td>
        <td>${list.length}</td>
        <td>${nMin}</td>
        <td>${nMod}</td>
        <td>${nMaj}</td>
        <td>${nCri}</td>
        <td><span class="${pCls}" style="font-weight:600">${baseScore}%</span></td>
      </tr>
    `;
  });

  const listContainer = document.getElementById('mist-list');
  listContainer.innerHTML = '';

  const fM = document.getElementById('mf-mg').value;
  const fS = document.getElementById('mf-sv').value;
  const fC = document.getElementById('mf-cat').value;
  const fF = document.getElementById('mf-from').value;
  const fT = document.getElementById('mf-to').value;

  let filtered = [...state.mistakes];
  if(fM) filtered = filtered.filter(x=>x.mgrId===fM);
  if(fS) filtered = filtered.filter(x=>x.severity===fS);
  if(fC) filtered = filtered.filter(x=>x.category===fC);
  if(fF) filtered = filtered.filter(x=>x.date>=fF);
  if(fT) filtered = filtered.filter(x=>x.date<=fT);

  if(filtered.length === 0) {
    listContainer.innerHTML = '<div class="empty">No entries fit parameters.</div>';
    return;
  }

  filtered.forEach(m => {
    listContainer.innerHTML += `
      <div class="mist-row">
        <div class="mist-top">
          <div class="mist-name">${m.mgrName} <span style="font-weight:normal;color:var(--t2)">(${m.dept})</span></div>
          <button class="btn bre bxs" onclick="deleteMistake('${m.id}')">Delete</button>
        </div>
        <div style="font-size:11px;margin-bottom:6px">
          <span class="badge sv-${m.severity}">${m.severity.toUpperCase()}</span>
          <span class="badge" style="background:var(--s2);color:var(--t2)">${m.category}</span>
          <span style="color:var(--t3)">| Date: ${m.date}</span>
        </div>
        <div style="font-size:13px;color:var(--t);margin-top:4px"><b>Infraction:</b> ${m.description}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px"><b>Action Plan:</b> ${m.action}</div>
      </div>
    `;
  });
}

function deleteMistake(id) {
  if(!confirm('Delete infraction file permanently?')) return;
  state.mistakes = state.mistakes.filter(m => m.id !== id);
  saveToStorage();
  aTab('mist', document.querySelector('.atab.on'));
}

function clrMistF() {
  document.getElementById('mf-mg').value = '';
  document.getElementById('mf-sv').value = '';
  document.getElementById('mf-cat').value = '';
  document.getElementById('mf-from').value = '';
  document.getElementById('mf-to').value = '';
  renderMistReport();
}

function renderAdminManagers() {
  document.getElementById('mg-cnt').textContent = state.managers.length;
  const parent = document.getElementById('mg-tbl');
  parent.innerHTML = '';

  if (state.managers.length === 0) {
    parent.innerHTML = '<div class="empty">No functional manager profiles registered.</div>';
    return;
  }

  let tableHtml = `<table class="tbl"><thead><tr><th>ID</th><th>Name</th><th>Department</th><th>Password</th><th>Action</th></tr></thead><tbody>`;
  state.managers.forEach(m => {
    tableHtml += `
      <tr>
        <td style="font-family:monospace">${m.id}</td>
        <td><b>${m.name}</b></td>
        <td>${m.dept}</td>
        <td style="font-family:monospace">${m.pw}</td>
        <td><button class="btn bre bxs" onclick="deleteMgr('${m.id}')">Remove</button></td>
      </tr>
    `;
  });
  tableHtml += `</tbody></table>`;
  parent.innerHTML = tableHtml;
}

function addMgr() {
  const id = document.getElementById('ni').value.trim().toUpperCase();
  const name = document.getElementById('nn').value.trim();
  const dept = document.getElementById('nd').value;
  const pw = document.getElementById('np').value;
  const pw2 = document.getElementById('np2').value;
  const msg = document.getElementById('mg-msg');

  if (!id || !name || !dept || !pw) { alert('Complete all parameter fields.'); return; }
  if (pw !== pw2) { alert('Security confirmation strings mismatch.'); return; }
  if (state.managers.some(m => m.id === id)) { alert('Manager ID string constraint conflict.'); return; }

  const newMgr = { id, name, dept, pw };
  state.managers.push(newMgr);

  state.balances[id] = {};
  CONFIG.LEAVE_TYPES.forEach(t => state.balances[id][t] = CONFIG.DEFAULT_BALANCE);

  saveToStorage();
  buildAdminFilterDropdowns();
  renderAdminManagers();

  document.getElementById('ni').value = '';
  document.getElementById('nn').value = '';
  document.getElementById('np').value = '';
  document.getElementById('np2').value = '';
  msg.textContent = '+ Profile Structured Successfully.';
  setTimeout(() => msg.textContent = '', 3000);
}

function deleteMgr(id) {
  if (!confirm(`Delete profile structural logs for ${id}?`)) return;
  state.managers = state.managers.filter(m => m.id !== id);
  delete state.balances[id];
  saveToStorage();
  buildAdminFilterDropdowns();
  renderAdminManagers();
}

function renderAdminDepts() {
  const parent = document.getElementById('dp-tbl');
  parent.innerHTML = '';

  if(state.departments.length === 0) {
    parent.innerHTML = '<div class="empty">No registered departments.</div>';
    return;
  }

  let html = `<table class="tbl"><thead><tr><th>Dept Name</th><th style="text-align:right">Action</th></tr></thead><tbody>`;
  state.departments.forEach(d => {
    html += `<tr><td><b>${d}</b></td><td style="text-align:right"><button class="btn bre bxs" onclick="deleteDept('${d}')">Delete</button></td></tr>`;
  });
  html += '</tbody></table>';
  parent.innerHTML = html;
}

function addDept() {
  const name = document.getElementById('dn').value.trim();
  if(!name) return;
  if(state.departments.includes(name)) { alert('Department already listed.'); return; }

  state.departments.push(name);
  saveToStorage();
  buildAdminFilterDropdowns();
  renderAdminDepts();
  document.getElementById('dn').value = '';
}

function deleteDept(name) {
  if(!confirm(`Delete structural system metrics for ${name}?`)) return;
  state.departments = state.departments.filter(d => d !== name);
  saveToStorage();
  buildAdminFilterDropdowns();
  renderAdminDepts();
}

function renderAdminCats() {
  const parent = document.getElementById('ct-list');
  parent.innerHTML = '';

  if(state.categories.length === 0) {
    parent.innerHTML = '<div class="empty">No system validation category criteria mapped.</div>';
    return;
  }

  let html = '<table class="tbl"><thead><tr><th>Category Field</th><th>Department Route</th><th style="text-align:right">Action</th></tr></thead><tbody>';
  state.categories.forEach(c => {
    html += `<tr><td><b>${c.name}</b></td><td><span class="badge b-pu">${c.dept}</span></td><td style="text-align:right"><button class="btn bre bxs" onclick="deleteCat('${c.id}')">Remove</button></td></tr>`;
  });
  html += '</tbody></table>';
  parent.innerHTML = html;
}

function addCat() {
  const name = document.getElementById('cn').value.trim();
  const dept = document.getElementById('cd').value;
  const msg = document.getElementById('ct-msg');

  if(!name || !dept) { alert('Define a category structural parsing tag label and department routing.'); return; }
  const newCat = { id: 'CAT-' + Date.now().toString().slice(-4), name, dept };

  state.categories.push(newCat);
  saveToStorage();
  renderAdminCats();

  document.getElementById('cn').value = '';
  msg.textContent = '🏷️ Node configuration assigned successfully.';
  setTimeout(() => msg.textContent = '', 3000);

function deleteCat(id) {
  if(!confirm('Drop structured category field parameters?')) return;
  state.categories = state.categories.filter(c => c.id !== id);
  saveToStorage();
  renderAdminCats();
}

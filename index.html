<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FormTrack — Office System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3248;
  --accent: #4f8ef7;
  --accent2: #7c5cfa;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --text: #e8eaf6;
  --text2: #8b92b8;
  --text3: #555e80;
  --radius: 10px;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; font-size: 14px; }

/* LOGIN */
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
.login-logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; margin-bottom: 6px; }
.login-sub { color: var(--text2); font-size: 13px; margin-bottom: 32px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group select option { background: var(--surface); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d7af0; }
.btn-success { background: var(--success); color: #0f1117; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-warning { background: var(--warning); color: #0f1117; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }
.error-msg { color: var(--danger); font-size: 12px; margin-top: 8px; }

/* APP SHELL */
.app { display: none; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
.topbar-user { display: flex; align-items: center; gap: 12px; }
.user-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
.user-badge.admin { color: var(--warning); border-color: var(--warning)33; }
.user-badge.manager { color: var(--accent); border-color: var(--accent)33; }
.logout-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 6px; }
.logout-btn:hover { color: var(--danger); background: var(--danger)11; }

/* NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; position: relative; transition: color 0.2s; border: none; background: none; }
.nav-item .nav-icon { font-size: 18px; }
.nav-item.active { color: var(--accent); }
.nav-badge { position: absolute; top: 6px; right: calc(50% - 14px); background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 4px; min-width: 16px; text-align: center; }

/* CONTENT */
.content { flex: 1; padding: 16px; padding-bottom: 70px; max-width: 700px; margin: 0 auto; width: 100%; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.page-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.page-title span { color: var(--text3); font-size: 13px; font-weight: 400; margin-left: 8px; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-title { font-weight: 600; font-size: 14px; }
.card-sub { color: var(--text2); font-size: 12px; margin-top: 2px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-blue { background: var(--accent)22; color: var(--accent); }
.badge-green { background: var(--success)22; color: var(--success); }
.badge-yellow { background: var(--warning)22; color: var(--warning); }
.badge-red { background: var(--danger)22; color: var(--danger); }
.badge-purple { background: var(--accent2)22; color: var(--accent2); }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; background: var(--surface); }
th { background: var(--surface2); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }

/* FILTER BAR */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.filter-bar select, .filter-bar input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; flex: 1; min-width: 120px; }

/* ADMIN TABS */
.admin-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 16px; overflow-x: auto; }
.admin-tab { flex-shrink: 0; padding: 7px 14px; border-radius: 8px; border: none; background: none; color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; transition: all 0.2s; position: relative; white-space: nowrap; }
.admin-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px #0005; }
.admin-tab .tab-dot { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: var(--danger); border-radius: 50%; }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-value { font-size: 26px; font-weight: 700; font-family: var(--mono); }
.stat-label { color: var(--text2); font-size: 11px; margin-top: 2px; }

/* FILE UPLOAD */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.upload-zone:hover { border-color: var(--accent); color: var(--accent); }
.file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.file-item { background: var(--surface2); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
.file-item .del { margin-left: auto; cursor: pointer; color: var(--danger); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* SEARCH */
.search-box { position: relative; margin-bottom: 12px; }
.search-box input { width: 100%; padding-left: 36px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }

/* STATUS DOT */
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot-green { background: var(--success); }
.dot-yellow { background: var(--warning); }
.dot-red { background: var(--danger); }
.dot-blue { background: var(--accent); }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); flex-direction: column; gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SYNC INDICATOR */
.sync-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 6px 20px; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.sync-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.empty { text-align: center; color: var(--text3); padding: 32px; font-size: 13px; }
.text-red { color: var(--danger); }
.text-green { color: var(--success); }
.text-yellow { color: var(--warning); }
.row-actions { display: flex; gap: 4px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">📋 FormTrack</div>
    <div class="login-sub">Office Management System</div>
    <div class="form-group">
      <label>Role</label>
      <select id="loginRole">
        <option value="manager">Manager</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group" id="managerSelectGroup">
      <label>Select Manager</label>
      <select id="loginManager"></select>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password">
    </div>
    <div id="loginError" class="error-msg"></div>
    <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="doLogin()">Login →</button>
    <div style="margin-top:16px;color:var(--text3);font-size:11px;text-align:center">Powered by Supabase Cloud Sync</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">📋 FormTrack</div>
    <div class="topbar-user">
      <div class="user-badge" id="userBadge"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Connected to cloud</span>
  </div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ SUPABASE ============
const SUPABASE_URL = 'https://vkbfsrttvbnoiwrgwiqg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_b-jW_IP7qptupeCo3cq7jA_-vje8U0w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ STATE ============
let currentUser = null; // { role, id, name, dept }
let DB = {
  managers: [],
  departments: [],
  categories: [],
  forms: [],
  leaves: [],
  lateEntries: [],
  mistakes: [],
  settings: { adminPassword: 'admin123' }
};
let syncStatus = 'connected';

// ============ SUPABASE DB OPS ============
async function dbGet(key) {
  try {
    const { data, error } = await sb.from('formtrack').select('value').eq('key', key).single();
    if (error || !data) return null;
    return JSON.parse(data.value);
  } catch { return null; }
}

async function dbSet(key, value) {
  setSyncStatus('syncing');
  try {
    const { error } = await sb.from('formtrack').upsert({ key, value: JSON.stringify(value), updated_at: new Date().toISOString() });
    if (error) throw error;
    setSyncStatus('connected');
    return true;
  } catch(e) {
    setSyncStatus('error');
    console.error('DB set error:', e);
    return false;
  }
}

async function loadAllData() {
  setSyncStatus('syncing');
  try {
    const { data, error } = await sb.from('formtrack').select('key,value');
    if (error) throw error;
    const map = {};
    (data || []).forEach(r => { try { map[r.key] = JSON.parse(r.value); } catch {} });
    if (map.managers) DB.managers = map.managers;
    if (map.departments) DB.departments = map.departments;
    if (map.categories) DB.categories = map.categories;
    if (map.forms) DB.forms = map.forms;
    if (map.leaves) DB.leaves = map.leaves;
    if (map.lateEntries) DB.lateEntries = map.lateEntries;
    if (map.mistakes) DB.mistakes = map.mistakes;
    if (map.settings) DB.settings = { ...DB.settings, ...map.settings };
    setSyncStatus('connected');
  } catch(e) {
    setSyncStatus('error');
    console.error('Load error:', e);
  }
}

async function saveCollection(key) {
  return await dbSet(key, DB[key]);
}

// ============ SYNC STATUS ============
function setSyncStatus(status) {
  syncStatus = status;
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (!dot) return;
  if (status === 'connected') {
    dot.className = 'sync-dot';
    text.textContent = 'Connected · cloud sync active';
  } else if (status === 'syncing') {
    dot.className = 'sync-dot syncing';
    text.textContent = 'Syncing...';
  } else {
    dot.className = 'sync-dot';
    dot.style.background = 'var(--danger)';
    text.textContent = 'Sync error — check connection';
  }
}

// ============ TOAST ============
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

// ============ MODAL ============
function openModal(title, body, footer = '') {
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ============ AUTH ============
function doLogin() {
  const role = document.getElementById('loginRole').value;
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (role === 'admin') {
    if (pw !== DB.settings.adminPassword) { errEl.textContent = 'Wrong admin password'; return; }
    currentUser = { role: 'admin', name: 'Admin', id: 'admin' };
  } else {
    const mid = document.getElementById('loginManager').value;
    const mgr = DB.managers.find(m => m.id === mid);
    if (!mgr) { errEl.textContent = 'Select a manager'; return; }
    if (pw !== mgr.password) { errEl.textContent = 'Wrong password'; return; }
    currentUser = { role: 'manager', id: mgr.id, name: mgr.name, dept: mgr.dept };
  }
  sessionStorage.setItem('ftUser', JSON.stringify(currentUser));
  startApp();
}

function doLogout() {
  sessionStorage.removeItem('ftUser');
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPassword').value = '';
}

document.getElementById('loginRole').addEventListener('change', function() {
  document.getElementById('managerSelectGroup').style.display = this.value === 'manager' ? 'block' : 'none';
});

// ============ APP START ============
async function init() {
  // Show loading
  document.getElementById('loginScreen').innerHTML = '<div style="color:var(--text2);font-family:var(--font)"><div class="spinner" style="margin:auto 0 12px"></div>Loading...</div>';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginScreen').style.alignItems = 'center';
  document.getElementById('loginScreen').style.justifyContent = 'center';
  
  await loadAllData();
  
  // Initialize defaults if empty
  if (DB.departments.length === 0) {
    DB.departments = [
      { id: 'd1', name: 'Production' },
      { id: 'd2', name: 'Quality' },
      { id: 'd3', name: 'Safety' }
    ];
    await saveCollection('departments');
  }
  if (DB.managers.length === 0) {
    DB.managers = Array.from({length:10}, (_,i) => ({
      id: 'MGR-' + String(i+1).padStart(2,'0'),
      name: 'Manager ' + (i+1),
      dept: 'd1',
      password: 'pass' + String(i+1).padStart(2,'0')
    }));
    await saveCollection('managers');
  }
  if (DB.categories.length === 0) {
    DB.categories = [
      { id: 'c1', name: 'Checklist', dept: 'd1', formCount: 10 },
      { id: 'c2', name: 'Cross Tally', dept: 'd1', formCount: 10 },
      { id: 'c3', name: 'Production Report', dept: 'd1', formCount: 10 },
      { id: 'c4', name: 'Whitemarking', dept: 'd2', formCount: 10 },
      { id: 'c5', name: 'Quality Check', dept: 'd2', formCount: 10 },
      { id: 'c6', name: 'Safety Inspection', dept: 'd3', formCount: 10 }
    ];
    await saveCollection('categories');
  }

  // Rebuild login screen
  document.getElementById('loginScreen').innerHTML = `
    <div class="login-card">
      <div class="login-logo">📋 FormTrack</div>
      <div class="login-sub">Office Management System</div>
      <div class="form-group">
        <label>Role</label>
        <select id="loginRole" onchange="document.getElementById('managerSelectGroup').style.display=this.value==='manager'?'block':'none'">
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group" id="managerSelectGroup">
        <label>Select Manager</label>
        <select id="loginManager">${DB.managers.map(m=>`<option value="${m.id}">${m.name} (${getDeptName(m.dept)})</option>`).join('')}</select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="loginError" class="error-msg"></div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="doLogin()">Login →</button>
      <div style="margin-top:16px;color:var(--text3);font-size:11px;text-align:center">☁️ Cloud Sync Active · All data saved online</div>
    </div>
  `;
  document.getElementById('loginScreen').style.alignItems = '';
  document.getElementById('loginScreen').style.justifyContent = '';

  // Check session
  const saved = sessionStorage.getItem('ftUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    // Validate user still exists
    if (currentUser.role === 'manager') {
      const mgr = DB.managers.find(m => m.id === currentUser.id);
      if (!mgr) { sessionStorage.removeItem('ftUser'); currentUser = null; }
      else currentUser = { role: 'manager', id: mgr.id, name: mgr.name, dept: mgr.dept };
    }
    if (currentUser) startApp();
  }
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('userBadge').textContent = currentUser.role === 'admin' ? '⚙️ Admin' : '👤 ' + currentUser.name;
  document.getElementById('userBadge').className = 'user-badge ' + currentUser.role;
  renderNav();
  renderCurrentTab();
}

// ============ HELPERS ============
function getDeptName(id) { const d = DB.departments.find(x=>x.id===id); return d?d.name:'—'; }
function getCatName(id) { const c = DB.categories.find(x=>x.id===id); return c?c.name:'—'; }
function getMgrName(id) { const m = DB.managers.find(x=>x.id===id); return m?m.name:'—'; }
function fmtDate(iso) { if(!iso)return'—'; return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDT(iso) { if(!iso)return'—'; return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ============ NAV ============
let currentTab = '';

function renderNav() {
  const nav = document.getElementById('bottomNav');
  const tabs = currentUser.role === 'admin' ? adminTabs() : managerTabs();
  nav.innerHTML = tabs.map(t => {
    const badge = t.badge ? t.badge() : 0;
    return `<button class="nav-item" id="nav_${t.id}" onclick="switchTab('${t.id}')">
      <span class="nav-icon">${t.icon}</span>
      <span>${t.label}</span>
      ${badge > 0 ? `<span class="nav-badge">${badge}</span>` : ''}
    </button>`;
  }).join('');
  const first = tabs[0].id;
  currentTab = first;
  setActiveNav(first);
}

function adminTabs() {

// --- DASHBOARD ---
function buildAdminDashboard() {
  const today = new Date().toDateString();
  const todayForms = DB.forms.filter(f=>new Date(f.submittedAt).toDateString()===today);
  const pendingLeave = DB.leaves.filter(l=>l.status==='pending').length;
  const pendingLate = DB.lateEntries.filter(l=>l.status==='pending').length;
  const totalForms = DB.forms.length;
  const mgrCount = DB.managers.length;

  let mgrActivity = DB.managers.map(m => {
    const mForms = DB.forms.filter(f=>f.managerId===m.id);
    const last = mForms.sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))[0];
    return { ...m, formCount: mForms.length, last };
  }).sort((a,b)=>b.formCount-a.formCount).slice(0,5);

  return `
    <div class="page-title">Dashboard</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${totalForms}</div><div class="stat-label">Total Forms</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--success)">${todayForms.length}</div><div class="stat-label">Today's Forms</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--warning)">${pendingLeave}</div><div class="stat-label">Leave Pending</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${pendingLate}</div><div class="stat-label">Late Pending</div></div>
    </div>
    <div class="page-title" style="font-size:14px">Top Active Managers</div>
    ${mgrActivity.map(m=>`
      <div class="card card-row">
        <div>
          <div class="card-title">${m.name}</div>
          <div class="card-sub">${getDeptName(m.dept)} · Last: ${m.last?fmtDT(m.last.submittedAt):'Never'}</div>
        </div>
        <span class="badge badge-blue">${m.formCount} forms</span>
      </div>
    `).join('')}
  `;
}

// --- ADMIN FORMS ---
function buildAdminForms() {
  const mgrs = DB.managers;
  const cats = DB.categories;
  
  let html = `
    <div class="page-title">Form Reports <span>${DB.forms.length} total</span></div>
    <div class="filter-bar">
      <select id="flt_mgr" onchange="filterForms()"><option value="">All Managers</option>${mgrs.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select>
      <select id="flt_cat" onchange="filterForms()"><option value="">All Categories</option>${cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
      <select id="flt_shift" onchange="filterForms()"><option value="">All Shifts</option><option>Day</option><option>Night</option></select>
    </div>
    <div id="formsDateRange" style="display:flex;gap:8px;margin-bottom:12px">
      <input type="date" id="flt_from" onchange="filterForms()" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--font)">
      <input type="date" id="flt_to" onchange="filterForms()" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--font)">
    </div>
    <div id="formsTableWrap"></div>
  `;
  setTimeout(filterForms, 50);
  return html;
}

function filterForms() {
  const mgr = document.getElementById('flt_mgr')?.value;
  const cat = document.getElementById('flt_cat')?.value;
  const shift = document.getElementById('flt_shift')?.value;
  const from = document.getElementById('flt_from')?.value;
  const to = document.getElementById('flt_to')?.value;
  
  let forms = DB.forms;
  if (mgr) forms = forms.filter(f=>f.managerId===mgr);
  if (cat) forms = forms.filter(f=>f.categoryId===cat);
  if (shift) forms = forms.filter(f=>f.shift===shift);
  if (from) forms = forms.filter(f=>f.submittedAt>=from);
  if (to) forms = forms.filter(f=>f.submittedAt<=to+'T23:59:59');
  forms = forms.sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt));
  
  const wrap = document.getElementById('formsTableWrap');
  if (!wrap) return;
  if (forms.length === 0) { wrap.innerHTML = '<div class="empty">No forms found</div>'; return; }
  
  wrap.innerHTML = `<div class="table-wrap"><table>
    <tr><th>Date/Time</th><th>Manager</th><th>Category</th><th>Shift</th><th>Files</th></tr>
    ${forms.map(f=>`<tr>
      <td style="font-family:var(--mono);font-size:12px">${fmtDT(f.submittedAt)}</td>
      <td>${getMgrName(f.managerId)}</td>
      <td>${getCatName(f.categoryId)}</td>
      <td><span class="badge ${f.shift==='Day'?'badge-yellow':'badge-purple'}">${f.shift}</span></td>
      <td>${f.files?f.files.length:0} files</td>
    </tr>`).join('')}
  </table></div>`;
}

function switchLeaveTab(tab) {
  document.querySelectorAll('[id^="ltab_"]').forEach(el=>el.classList.remove('active'));

  if(el) el.classList.add('active');

  if (tab === 'pending') {
    const pending = DB.leaves.filter(l=>l.status==='pending');
    if (pending.length===0) { c.innerHTML='<div class="empty">No pending leaves ✓</div>'; return; }
    c.innerHTML = pending.map(l=>`
      <div class="card">
        <div class="card-row">
          <div>
            <div class="card-title">${getMgrName(l.managerId)}</div>
            <div class="card-sub">${l.type} · ${fmtDate(l.from)} to ${fmtDate(l.to)}</div>

        </div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn btn-success btn-sm" onclick="reviewLeave('${l.id}','approved')">✓ Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reviewLeave('${l.id}','rejected')">✗ Reject</button>
        </div>
      </div>
    `).join('');
  } else if (tab === 'all') {
    const all = [...DB.leaves].sort((a,b)=>new Date(b.appliedAt)-new Date(a.appliedAt));
    if (all.length===0) { c.innerHTML='<div class="empty">No leaves</div>'; return; }
    c.innerHTML = `<div class="table-wrap"><table>
      <tr><th>Manager</th><th>Type</th><th>From</th><th>To</th><th>Status</th></tr>
      ${all.map(l=>`<tr>
        <td>${getMgrName(l.managerId)}</td><td>${l.type}</td>
        <td>${fmtDate(l.from)}</td><td>${fmtDate(l.to)}</td>
        <td><span class="badge ${l.status==='approved'?'badge-green':l.status==='rejected'?'badge-red':'badge-yellow'}">${l.status}</span></td>
      </tr>`).join('')}
    </table></div>`;
  } else if (tab === 'balance') {
    c.innerHTML = `<div class="table-wrap"><table>
      <tr><th>Manager</th><th>Casual</th><th>Sick</th><th>Earned</th><th>Emergency</th></tr>
      ${DB.managers.map(m=>{
        const bal = getLeaveBalance(m.id);
        return `<tr><td>${m.name}</td><td>${bal.casual}</td><td>${bal.sick}</td><td>${bal.earned}</td><td>${bal.emergency}</td></tr>`;
      }).join('')}
    </table></div>`;
  } else if (tab === 'add') {
    c.innerHTML = `
      <div class="card">
        <div class="form-group"><label>Manager</label><select id="al_mgr">${DB.managers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>Leave Type</label><select id="al_type"><option>Casual Leave</option><option>Sick Leave</option><option>Earned Leave</option><option>Emergency Leave</option></select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="form-group"><label>From</label><input type="date" id="al_from"></div>
          <div class="form-group"><label>To</label><input type="date" id="al_to"></div>
        </div>
        <div class="form-group"><label>Reason</label><textarea id="al_reason" rows="2"></textarea></div>
        <button class="btn btn-primary" onclick="adminAddLeave()">Submit Leave</button>
      </div>
    `;
  }
}

function getLeaveBalance(mgrid) {
  const defaults = { casual:12, sick:10, earned:15, emergency:3 };
  const used = { casual:0, sick:0, earned:0, emergency:0 };
  DB.leaves.filter(l=>l.managerId===mgrid&&l.status==='approved').forEach(l=>{
    const days = Math.ceil((new Date(l.to)-new Date(l.from))/(864e5))+1;
    const k = l.type.toLowerCase().split(' ')[0];
    if(used[k]!==undefined) used[k]+=days;
  });
  return { casual:defaults.casual-used.casual, sick:defaults.sick-used.sick, earned:defaults.earned-used.earned, emergency:defaults.emergency-used.emergency };
}

async function reviewLeave(id, status) {
  const l = DB.leaves.find(x=>x.id===id);
  if(l) l.status = status;
  await saveCollection('leaves');
  switchTab('a_leave');
  toast(status==='approved'?'Leave approved ✓':'Leave rejected', status==='approved'?'success':'error');
}

  DB.leaves.push({ id:uid(), managerId:mgr, type, from, to, reason, status:'approved', appliedAt:new Date().toISOString() });
  await saveCollection('leaves');
  toast('Leave added ✓','success');
  switchLeaveTab('all');
}

function buildAdminMistakes() {
  const cats=['Form Error','Late Submission','Safety Issue','Quality Issue','Process Violation','Other'];
  const sevs=['Minor','Moderate','Major','Critical'];
  const sevColors={Minor:'badge-yellow',Moderate:'badge-yellow',Major:'badge-red',Critical:'badge-red'};
  
  return `
    <div class="page-title">Mistake Reports</div>
    <div class="admin-tabs">
      <button class="admin-tab active" id="mtab_list" onclick="switchMistakeTab('list')">All Reports</button>
      <button class="admin-tab" id="mtab_add" onclick="switchMistakeTab('add')">+ Add Report</button>
      <button class="admin-tab" id="mtab_perf" onclick="switchMistakeTab('perf')">Performance</button>
    </div>
    <div id="mistakeTabContent"></div>
  `;
  setTimeout(()=>switchMistakeTab('list'),50);
}

function switchMistakeTab(tab) {
  document.querySelectorAll('[id^="mtab_"]').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('mtab_'+tab);
  if(el) el.classList.add('active');
  const c = document.getElementById('mistakeTabContent');
  if(!c) return;
  
  if (tab === 'list') {
    const mistakes = [...DB.mistakes].sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(!mistakes.length){c.innerHTML='<div class="empty">No mistake reports</div>';return;}
    c.innerHTML = mistakes.map(m=>`
      <div class="card">
        <div class="card-row">
          <div>
            <div class="card-title">${getMgrName(m.managerId)}</div>
            <div class="card-sub">${fmtDate(m.date)} · ${m.category}</div>
          </div>
          <span class="badge ${m.severity==='Minor'?'badge-yellow':m.severity==='Moderate'?'badge-yellow':'badge-red'}">${m.severity}</span>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text)">${m.description}</div>
        ${m.actionTaken?`<div style="margin-top:4px;font-size:11px;color:var(--text2)">Action: ${m.actionTaken}</div>`:''}
      </div>
    `).join('');
  } else if (tab === 'add') {
    c.innerHTML = `
      <div class="card">
        <div class="form-group"><label>Manager</label><select id="mr_mgr">${DB.managers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>Date</label><input type="date" id="mr_date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Severity</label><select id="mr_sev"><option>Minor</option><option>Moderate</option><option>Major</option><option>Critical</option></select></div>
        <div class="form-group"><label>Category</label><select id="mr_cat"><option>Form Error</option><option>Late Submission</option><option>Safety Issue</option><option>Quality Issue</option><option>Process Violation</option><option>Other</option></select></div>
        <div class="form-group"><label>Description</label><textarea id="mr_desc" rows="3" placeholder="Describe the mistake..."></textarea></div>
        <div class="form-group"><label>Action Taken</label><textarea id="mr_action" rows="2" placeholder="What action was taken..."></textarea></div>
        <button class="btn btn-primary" onclick="addMistake()">Submit Report</button>
      </div>
    `;
  } else if (tab === 'perf') {
    const scores = DB.managers.map(m=>{
      const mist = DB.mistakes.filter(x=>x.managerId===m.id);
      const score = Math.max(0, 100 - mist.reduce((s,x)=>s+({Minor:2,Moderate:5,Major:10,Critical:20}[x.severity]||0),0));
      const grade = score>=90?'Excellent':score>=75?'Good':score>=60?'Average':score>=40?'Poor':'Critical';
      return {...m, total:mist.length, score, grade};
    });
    c.innerHTML = `<div class="table-wrap"><table>
      <tr><th>Manager</th><th>Mistakes</th><th>Score</th><th>Grade</th></tr>
      ${scores.map(m=>`<tr>
        <td>${m.name}</td><td>${m.total}</td>
        <td style="font-family:var(--mono)">${m.score}</td>
        <td><span class="badge ${m.grade==='Excellent'?'badge-green':m.grade==='Good'?'badge-blue':m.grade==='Average'?'badge-yellow':'badge-red'}">${m.grade}</span></td>
      </tr>`).join('')}
    </table></div>`;
  }
}

async function addMistake() {
  const mgr=document.getElementById('mr_mgr').value;
  const date=document.getElementById('mr_date').value;
  const severity=document.getElementById('mr_sev').value;
  const category=document.getElementById('mr_cat').value;
  const description=document.getElementById('mr_desc').value.trim();

  switchMistakeTab('list');
}

// --- UPLOAD ---
function buildManagerUpload() {
  const myDept = currentUser.dept;
  const myCats = DB.categories.filter(c=>c.dept===myDept);
  
  const now = new Date();
  const hour = now.getHours();
  const defaultShift = (hour>=8&&hour<20)?'Day':'Night';
  
  return `
    <div class="page-title">Upload Forms</div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="form-group">
          <label>Shift</label>
          <select id="up_shift">
            <option ${defaultShift==='Day'?'selected':''}>Day</option>
            <option ${defaultShift==='Night'?'selected':''}>Night</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="up_date" value="${now.toISOString().slice(0,10)}">
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="up_cat">
          ${myCats.length ? myCats.map(c=>`<option value="${c.id}">${c.name} (${c.formCount} forms)</option>`).join('') : '<option value="">No categories for your department</option>'}
        </select>
      </div>
      ${myCats.length ? `
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
          📎 Click or drag to upload forms<br>
          <span style="font-size:12px">Photos, PDFs, images accepted</span>
          <input type="file" id="fileInput" multiple accept="image/*,.pdf" style="display:none" onchange="handleFiles(this.files)">
        </div>
        <div id="fileList" class="file-list"></div>
        <button class="btn btn-primary btn-full" style="margin-top:14px" onclick="submitForms()">📤 Submit Forms</button>
      ` : '<div class="empty">No categories assigned to your department. Contact admin.</div>'}
    </div>
  `;
}

let uploadedFiles = [];

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!uploadedFiles.find(x=>x.name===f.name)) {
      uploadedFiles.push(f);
    }
  });
  renderFileList();
}

function renderFileList() {
  const el = document.getElementById('fileList');
  if (!el) return;
  el.innerHTML = uploadedFiles.map((f,i)=>`
    <div class="file-item">
      <span>${f.type.startsWith('image')?'🖼️':'📄'}</span>
      <span>${f.name}</span>
      <span style="color:var(--text3);font-size:11px">${(f.size/1024).toFixed(0)}KB</span>
      <span class="del" onclick="removeFile(${i})">✕</span>
    </div>
  `).join('');
}

function removeFile(i) {
  uploadedFiles.splice(i,1);
  renderFileList();
}

async function submitForms() {
  const shift = document.getElementById('up_shift').value;
  const date = document.getElementById('up_date').value;
  const catId = document.getElementById('up_cat').value;
  if (!catId) { toast('Select a category','error'); return; }
  if (uploadedFiles.length===0) { toast('Upload at least one file','error'); return; }
  
  const cat = DB.categories.find(c=>c.id===catId);
  if (uploadedFiles.length < cat.formCount) {
    if (!confirm(`Category requires ${cat.formCount} forms, you uploaded ${uploadedFiles.length}. Continue?`)) return;
  }
  
  // Store file names (base64 would be too large for Supabase free tier — store metadata)
  const filesMeta = uploadedFiles.map(f=>({ name:f.name, size:f.size, type:f.type }));
  
  DB.forms.push({
    id: uid(),
    managerId: currentUser.id,
    categoryId: catId,
    shift,
    date,
    files: filesMeta,
    fileCount: uploadedFiles.length,
    submittedAt: new Date().toISOString()
  });
  
  await saveCollection('forms');
  uploadedFiles = [];
  toast(`${filesMeta.length} forms submitted ✓`, 'success');
  switchTab('m_myforms');
}
